application:
  web: web-src
  # Environment variables for the web app (frontend)
  # These will be injected at build time by Parcel
  env:
    CLIENT_IDENTITY: $CLIENT_IDENTITY
    # ENVIRONMENT determines which API tier to use: 'dev', 'stage', or 'prod'
    # Set via CI/CD or .env file. Defaults to 'dev' if not specified.
    ENVIRONMENT: $ENVIRONMENT
    # IMS Authentication for standalone mode (without Experience Cloud Shell)
    # Set IMS_CLIENT_ID and IMS_SCOPES in .env file
    IMS_CLIENT_ID: $IMS_CLIENT_ID
    IMS_SCOPES: $IMS_SCOPES
    IMS_ENV: $IMS_ENV
  extensions:
    dx/excshell/1:
      # =========================================================================
      # CUSTOM IMS CONFIGURATION
      # =========================================================================
      # Custom IMS authentication for Unified Shell integration
      # Requires: IMS_CLIENT_ID and IMS_SCOPES in .env file
      # See: docs/UNIFIED_SHELL_REGISTRATION.md for setup instructions
      # =========================================================================
      sandbox:
        ims:
          client_id: $IMS_CLIENT_ID
          scopes: $IMS_SCOPES
      operations:
        view:
          - type: web
            impl: index.html
