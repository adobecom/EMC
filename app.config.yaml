application:
  web: web-src
  # Environment variables for the web app (frontend)
  # These will be injected at build time by Parcel
  env:
    DEV_CLIENT_IDENTITY: $DEV_CLIENT_IDENTITY
    STAGE_CLIENT_IDENTITY: $STAGE_CLIENT_IDENTITY
    PROD_CLIENT_IDENTITY: $PROD_CLIENT_IDENTITY
    # ENVIRONMENT determines which API tier to use: 'dev', 'stage', or 'prod'
    # Set via CI/CD or .env file. Defaults to 'dev' if not specified.
    ENVIRONMENT: $ENVIRONMENT
    # IMS Authentication for standalone mode (without Experience Cloud Shell)
    # IMS_CLIENT_ID and IMS_SCOPES are used when the app runs outside the shell
    IMS_CLIENT_ID: $IMS_CLIENT_ID
    IMS_SCOPES: $IMS_SCOPES
    DEV_GOOGLE_PLACES_API: $DEV_GOOGLE_PLACES_API
    STAGE_GOOGLE_PLACES_API: $STAGE_GOOGLE_PLACES_API
    PROD_GOOGLE_PLACES_API: $PROD_GOOGLE_PLACES_API
  extensions:
    dx/excshell/1:
      # Uses the default ExC Shell client (exc_app) — no custom IMS config required
      operations:
        view:
          - type: web
            impl: index.html
