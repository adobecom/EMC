name: Deploy to Stage

on:
  push:
    branches:
      - stage

concurrency:
  group: deploy-stage
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup CLI
        uses: adobe/aio-cli-setup-action@1.3.0
        with:
          os: ubuntu-latest
          version: 10.x.x

      - name: Deploy
        env:
          AIO_RUNTIME_NAMESPACE: ${{ vars.AIO_RUNTIME_NAMESPACE_STAGE }}
          AIO_RUNTIME_AUTH: ${{ secrets.AIO_RUNTIME_AUTH_STAGE }}
          DEV_CLIENT_IDENTITY: ${{ secrets.DEV_CLIENT_IDENTITY }}
          STAGE_CLIENT_IDENTITY: ${{ secrets.STAGE_CLIENT_IDENTITY }}
          PROD_CLIENT_IDENTITY: ${{ secrets.PROD_CLIENT_IDENTITY }}
          IMS_CLIENT_ID: ${{ secrets.IMS_CLIENT_ID }}
          IMS_SCOPES: ${{ secrets.IMS_SCOPES }}
        run: npm run deploy:stage

      - name: Deployment Summary
        run: |
          echo "### ✅ Stage Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Stage" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
